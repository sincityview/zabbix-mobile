name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up golang
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install fyne-cross
        run: go install github.com/fyne-io/fyne-cross@latest

      - name: Build APK
        run: |
          fyne-cross android \
            -app-id com.zabbix.mobile.monitor \
            -icon icon.png \
            -app-version "${{ steps.get_version.outputs.VERSION }}" \
            -app-build ${{ github.run_number }} \
            -ldflags "-s -w" \
            -arch arm64 \
            -name zabbix

      - name: Sign APK
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.jks
          ANDROID_HOME=${ANDROID_HOME:-/usr/local/lib/android/sdk}
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* 2>/dev/null | tail -1)
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "BUILD_TOOLS_DIR=$BUILD_TOOLS_DIR"
          APK_PATH=$(find fyne-cross/dist -name "*.apk" | head -1)
          echo "APK_PATH=$APK_PATH"
          $BUILD_TOOLS_DIR/zipalign -v -p 4 "$APK_PATH" zabbix-aligned.apk
          $BUILD_TOOLS_DIR/apksigner sign --ks release.jks \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            --out "zabbix-$VERSION.apk" zabbix-aligned.apk
          $BUILD_TOOLS_DIR/apksigner verify "zabbix-$VERSION.apk"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: zabbix-${{ steps.get_version.outputs.VERSION }}.apk
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
